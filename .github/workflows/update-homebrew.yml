name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish to the Homebrew tap
        required: true
        type: string

permissions: {}

jobs:
  prepare-formula:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository at released commit
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout repository for manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read package version from released commit
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${DISPATCH_VERSION#v}"
          else
            VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Wait for npm registry propagation
        run: |
          for i in $(seq 1 30); do
            if npm view "@fitlab-ai/agent-infra@${VERSION}" version >/dev/null 2>&1; then
              echo "Package @fitlab-ai/agent-infra@${VERSION} available on npm"
              exit 0
            fi
            echo "Waiting for npm registry... (attempt $i/30)"
            sleep 10
          done
          echo "::error::Package not found on npm after 5 minutes"
          exit 1

      - name: Get tarball URL and SHA256
        run: |
          TARBALL_URL=$(npm view "@fitlab-ai/agent-infra@${VERSION}" dist.tarball)
          curl -fsSL "$TARBALL_URL" -o package.tgz
          SHA256=$(sha256sum package.tgz | cut -d ' ' -f 1)
          echo "TARBALL_URL=$TARBALL_URL" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: fitlab-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        working-directory: homebrew-tap
        run: |
          mkdir -p Formula
          cat > Formula/agent-infra.rb <<EOF
          class AgentInfra < Formula
            desc "Bootstrap tool for AI multi-tool collaboration infrastructure"
            homepage "https://github.com/fitlab-ai/agent-infra"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"
            # __BOTTLE_BLOCK__

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agent-infra version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-infra.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "agent-infra ${VERSION}"
          git push

      - name: Record release version
        run: echo "${{ steps.version.outputs.version }}" > release-version.txt

      - name: Upload release-version artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-version
          path: release-version.txt

  bake-bottle:
    needs: prepare-formula
    if: ${{ needs.prepare-formula.outputs.version != '' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Apple Silicon (arm64) bottles only. The Intel `macos-14-large` larger
      # runner requires a paid plan and is unavailable here, so Intel macOS
      # users install via source build (`brew install` falls back automatically).
      matrix:
        include:
          - os: macos-26
            platform: arm64_tahoe
          - os: macos-15
            platform: arm64_sequoia
          - os: macos-14
            platform: arm64_sonoma
    steps:
      - name: Configure brew tap
        run: brew tap fitlab-ai/tap

      - name: Build bottle
        env:
          VERSION: ${{ needs.prepare-formula.outputs.version }}
        run: |
          ROOT_URL="https://github.com/fitlab-ai/agent-infra/releases/download/v${VERSION}"
          brew install --build-bottle --formula --verbose agent-infra
          brew bottle --json --no-rebuild --root-url="$ROOT_URL" agent-infra

      - name: Rename to canonical filename and upload bottle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-formula.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ls -la *.bottle.tar.gz *.bottle.json
          JSON="agent-infra--${VERSION}.${PLATFORM}.bottle.json"
          LOCAL=$(jq -r --arg p "$PLATFORM" '.[] | .bottle.tags[$p].local_filename' "$JSON")
          CANON=$(jq -r --arg p "$PLATFORM" '.[] | .bottle.tags[$p].filename' "$JSON")
          test "$LOCAL" != "null" && test "$CANON" != "null"
          test -n "$LOCAL" && test -n "$CANON" && test -f "$LOCAL"
          mv "$LOCAL" "$CANON"
          gh release upload "v${VERSION}" "$CANON" --clobber --repo fitlab-ai/agent-infra

      - name: Upload bottle JSON as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: bottle-json-${{ matrix.platform }}
          path: agent-infra--*.${{ matrix.platform }}.bottle.json
          retention-days: 7

  publish-bottle:
    needs: [prepare-formula, bake-bottle]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for generator script)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: fitlab-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          fetch-depth: 0

      - name: Download all bottle JSON artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bottle-json-*
          path: ./bottles
          merge-multiple: true

      - name: Require all three bottles
        run: |
          COUNT=$(find ./bottles -name '*.bottle.json' | wc -l | tr -d ' ')
          echo "Found $COUNT bottle JSON files (expected 3)"
          if [ "$COUNT" -ne 3 ]; then
            echo "::error::Expected 3 bottle JSON files but found $COUNT"
            exit 1
          fi

      - name: Generate bottle block into Formula
        run: |
          node .github/scripts/generate-bottle-block.mjs \
            --bottles ./bottles \
            --formula homebrew-tap/Formula/agent-infra.rb
          echo "----- resulting Formula -----"
          cat homebrew-tap/Formula/agent-infra.rb

      - name: Commit Formula with bottle block
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-infra.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit --amend --no-edit
          git push --force-with-lease
