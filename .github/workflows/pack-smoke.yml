name: Pack Smoke

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pack-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-smoke:
    name: npm pack + install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball
        shell: bash
        run: |
          set -euxo pipefail
          npm pack --pack-destination "$RUNNER_TEMP" >/dev/null
          TARBALL=$(ls "$RUNNER_TEMP"/fitlab-ai-agent-infra-*.tgz)
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          ls -la "$TARBALL"

      - name: Install tarball in isolated tree
        shell: bash
        run: |
          set -euxo pipefail
          SMOKE_DIR="$RUNNER_TEMP/agent-infra-smoke"
          mkdir -p "$SMOKE_DIR"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null
          npm install "$TARBALL"

      - name: Smoke - version
        shell: bash
        run: |
          cd "$RUNNER_TEMP/agent-infra-smoke"
          ./node_modules/.bin/agent-infra version

      - name: Smoke - sandbox --help
        shell: bash
        run: |
          cd "$RUNNER_TEMP/agent-infra-smoke"
          ./node_modules/.bin/agent-infra sandbox --help
