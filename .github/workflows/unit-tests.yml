name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify inline build output is committed
        run: node scripts/build-inline.js --check

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Coverage report (informational)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          coverage_output=$(npm run test:coverage --silent 2>&1)
          echo "$coverage_output" | sed -n '/start of coverage report/,/end of coverage report/p' > coverage-block.txt
          {
            echo "## Coverage (informational, not a gate)"
            echo ""
            echo "> 覆盖率仅作为薄弱区域提示；不作为 merge gate，不追求百分比目标。"
            echo ""
            echo '```text'
            cat coverage-block.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          fail_ci_if_error: false
